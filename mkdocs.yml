site_name: Java Coding Practice
site_description: LeetCode-style algorithm & Java practice problems
site_author: Vasili Zvarych
repo_url: https://github.com/vasi1isk/leetcode
repo_name: vasi1isk/leetcode

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Algorithms: algorithms.md
  - Basic DS & Algorithms: basic.md
  - Multithreading: multithreading.md
  - Design Patterns: patterns.md
  - Java Streams: streams.md
  - Other & Interview Prep: other.md
  - Technical Talks: talks.md

markdown_extensions:
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - admonition
  - pymdownx.details
